<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Georgia, 'Times New Roman', serif">
  <title>Artificial Life Is Everywhere — So Why Is It So Hard to Teach? AEDU Talk Graphic</title>
  <desc>A conceptual diagram showing artificial life at the centre of many disciplines, surrounded by tensions in pedagogy and a call to register for the AEDU virtual workshop, May 2026.</desc>

  <!-- Background -->
  <rect width="760" height="420" fill="#0d0d1a"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="0.5"/>
    </pattern>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="760" height="420" fill="url(#grid)"/>

  <!-- Outer discipline orbits — faint rings -->
  <circle cx="340" cy="205" r="155" fill="none" stroke="#ffffff10" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="340" cy="205" r="110" fill="none" stroke="#ffffff14" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- Biology -->
  <circle cx="340" cy="55" r="26" fill="#1a3a2e" stroke="#3ecf8e" stroke-width="1.5"/>
  <text x="340" y="50" text-anchor="middle" fill="#3ecf8e" font-size="9" font-family="monospace">Biology</text>
  <line x1="340" y1="81" x2="340" y2="130" stroke="#3ecf8e40" stroke-width="1"/>

  <!-- CS -->
  <circle cx="488" cy="98" r="26" fill="#1a2a3e" stroke="#5b9cf6" stroke-width="1.5"/>
  <text x="488" y="93" text-anchor="middle" fill="#5b9cf6" font-size="9" font-family="monospace">Computer</text>
  <text x="488" y="105" text-anchor="middle" fill="#5b9cf6" font-size="9" font-family="monospace">Science</text>
  <line x1="464" y1="118" x2="400" y2="160" stroke="#5b9cf640" stroke-width="1"/>

  <!-- Physics -->
  <circle cx="530" cy="230" r="26" fill="#2a1a3e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="530" y="233" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">Physics</text>
  <line x1="504" y1="222" x2="450" y2="210" stroke="#a78bfa40" stroke-width="1"/>

  <!-- Philosophy -->
  <circle cx="460" cy="345" r="26" fill="#2e1a20" stroke="#f472b6" stroke-width="1.5"/>
  <text x="460" y="348" text-anchor="middle" fill="#f472b6" font-size="9" font-family="monospace">Philosophy</text>
  <line x1="440" y1="322" x2="390" y2="265" stroke="#f472b640" stroke-width="1"/>

  <!-- Cognitive Science -->
  <circle cx="230" cy="345" r="26" fill="#2e2a1a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="230" y="340" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="monospace">Cognitive</text>
  <text x="230" y="352" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="monospace">Science</text>
  <line x1="252" y1="322" x2="305" y2="265" stroke="#fbbf2440" stroke-width="1"/>

  <!-- Social Sciences -->
  <circle cx="158" cy="225" r="26" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="158" y="220" text-anchor="middle" fill="#34d399" font-size="8" font-family="monospace">Social</text>
  <text x="158" y="232" text-anchor="middle" fill="#34d399" font-size="8" font-family="monospace">Sciences</text>
  <line x1="184" y1="220" x2="235" y2="210" stroke="#34d39940" stroke-width="1"/>

  <!-- Math & Logic -->
  <circle cx="200" cy="98" r="26" fill="#1a2020" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="200" y="93" text-anchor="middle" fill="#67e8f9" font-size="9" font-family="monospace">Math</text>
  <text x="200" y="105" text-anchor="middle" fill="#67e8f9" font-size="9" font-family="monospace">&amp; Logic</text>
  <line x1="222" y1="117" x2="285" y2="158" stroke="#67e8f940" stroke-width="1"/>

  <!-- Centre ALife blob -->
  <circle cx="340" cy="205" r="68" fill="#12102a" stroke="#e2e8f0" stroke-width="2" filter="url(#softglow)"/>
  <circle cx="340" cy="205" r="68" fill="none" stroke="#ffffff30" stroke-width="0.5"/>
  <text x="340" y="190" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" letter-spacing="1">ARTIFICIAL</text>
  <text x="340" y="207" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" letter-spacing="1">LIFE</text>
  <text x="340" y="228" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">domain · methodology · mindset</text>

  <!-- Right panel -->
  <rect x="600" y="25" width="148" height="370" rx="8" fill="#ffffff06" stroke="#ffffff15" stroke-width="1"/>
  <text x="674" y="52" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="bold">Tensions</text>
  <line x1="618" y1="60" x2="730" y2="60" stroke="#ffffff20" stroke-width="0.5"/>

  <rect x="614" y="70" width="120" height="44" rx="5" fill="#1e293b"/>
  <text x="674" y="87" text-anchor="middle" fill="#5b9cf6" font-size="8.5" font-family="monospace">Discipline</text>
  <text x="674" y="97" text-anchor="middle" fill="#94a3b8" font-size="7.5" font-family="monospace">vs.</text>
  <text x="674" y="108" text-anchor="middle" fill="#5b9cf6" font-size="8.5" font-family="monospace">Approach</text>

  <rect x="614" y="123" width="120" height="44" rx="5" fill="#1e293b"/>
  <text x="674" y="140" text-anchor="middle" fill="#a78bfa" font-size="8.5" font-family="monospace">Coherence</text>
  <text x="674" y="150" text-anchor="middle" fill="#94a3b8" font-size="7.5" font-family="monospace">vs.</text>
  <text x="674" y="161" text-anchor="middle" fill="#a78bfa" font-size="8.5" font-family="monospace">Discoverability</text>

  <rect x="614" y="176" width="120" height="44" rx="5" fill="#1e293b"/>
  <text x="674" y="193" text-anchor="middle" fill="#f472b6" font-size="8.5" font-family="monospace">Ambition</text>
  <text x="674" y="203" text-anchor="middle" fill="#94a3b8" font-size="7.5" font-family="monospace">vs.</text>
  <text x="674" y="214" text-anchor="middle" fill="#f472b6" font-size="8.5" font-family="monospace">Pedagogy</text>

  <rect x="614" y="232" width="120" height="62" rx="5" fill="#0f172a" stroke="#fbbf2440" stroke-width="1"/>
  <text x="674" y="250" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="monospace">What IS</text>
  <text x="674" y="262" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="monospace">artificial life?</text>
  <text x="674" y="278" text-anchor="middle" fill="#64748b" font-size="7.5" font-family="monospace">Who is it for?</text>

  <rect x="614" y="308" width="120" height="72" rx="6" fill="#1e3a5f" stroke="#5b9cf6" stroke-width="1.5"/>
  <text x="674" y="326" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="bold">AEDU Workshop</text>
  <text x="674" y="339" text-anchor="middle" fill="#cbd5e1" font-size="7.5">Virtual · May 2026</text>
  <line x1="626" y1="347" x2="722" y2="347" stroke="#5b9cf640" stroke-width="0.5"/>
  <text x="674" y="361" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="bold">Register now →</text>
  <text x="674" y="372" text-anchor="middle" fill="#64748b" font-size="6.5" font-family="monospace">alife.org/aedu</text>

  <!-- Title bar at bottom -->
  <rect x="0" y="378" width="590" height="42" fill="#0f172a"/>
  <text x="20" y="395" fill="#f1f5f9" font-size="11" font-weight="bold">"Artificial Life Is Everywhere —</text>
  <text x="20" y="412" fill="#f1f5f9" font-size="11" font-weight="bold">So Why Is It So Hard to Teach?"</text>
  <text x="572" y="404" text-anchor="end" fill="#94a3b8" font-size="9" font-family="monospace">Imy · AEDU 2026</text>
</svg>
