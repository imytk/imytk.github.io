<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#0d1b2a"/>
  <!-- Robot body -->
  <rect x="65" y="75" width="70" height="55" rx="10" fill="#2698ba" opacity="0.85"/>
  <!-- Robot head -->
  <rect x="72" y="40" width="56" height="40" rx="10" fill="#2698ba" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="26" stroke="#2698ba" stroke-width="2.5"/>
  <circle cx="100" cy="22" r="5" fill="#e040fb" opacity="0.9"/>
  <!-- Eyes (happy arcs) -->
  <path d="M82,57 Q87,52 92,57" fill="none" stroke="white" stroke-width="2.5"/>
  <path d="M108,57 Q113,52 118,57" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Mouth smile -->
  <path d="M87,68 Q100,76 113,68" fill="none" stroke="white" stroke-width="2"/>
  <!-- Chest screen -->
  <rect x="80" y="90" width="40" height="28" rx="4" fill="#0d1b2a" opacity="0.7"/>
  <!-- Engagement bars on screen -->
  <rect x="84" y="110" width="5" height="6" rx="1" fill="#4caf50" opacity="0.9"/>
  <rect x="91" y="104" width="5" height="12" rx="1" fill="#4caf50" opacity="0.9"/>
  <rect x="98" y="98" width="5" height="18" rx="1" fill="#4caf50" opacity="0.9"/>
  <rect x="105" y="94" width="5" height="22" rx="1" fill="#4caf50" opacity="0.9"/>
  <rect x="112" y="100" width="5" height="16" rx="1" fill="#4caf50" opacity="0.9"/>
  <!-- Arms -->
  <rect x="28" y="80" width="40" height="14" rx="5" fill="#2698ba" opacity="0.7"/>
  <rect x="132" y="80" width="40" height="14" rx="5" fill="#2698ba" opacity="0.7"/>
  <!-- Legs -->
  <rect x="72" y="130" width="22" height="32" rx="5" fill="#2698ba" opacity="0.7"/>
  <rect x="106" y="130" width="22" height="32" rx="5" fill="#2698ba" opacity="0.7"/>
  <text x="100" y="188" font-family="sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Companion Robot</text>
</svg>