<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <!-- connecting lines -->
  <line x1="100" y1="100" x2="40" y2="60" stroke="#b509ac" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="160" y2="60" stroke="#b509ac" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="40" y2="145" stroke="#b509ac" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="160" y2="145" stroke="#b509ac" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="100" y2="30" stroke="#2698ba" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="60" x2="160" y2="60" stroke="#b509ac" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="145" x2="160" y2="145" stroke="#b509ac" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="60" x2="40" y2="145" stroke="#b509ac" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="60" x2="160" y2="145" stroke="#b509ac" stroke-width="1" opacity="0.3"/>
  <!-- outer agents -->
  <circle cx="40" cy="60" r="11" fill="#2698ba" opacity="0.85"/>
  <circle cx="160" cy="60" r="11" fill="#2698ba" opacity="0.85"/>
  <circle cx="40" cy="145" r="11" fill="#2698ba" opacity="0.85"/>
  <circle cx="160" cy="145" r="11" fill="#2698ba" opacity="0.85"/>
  <circle cx="100" cy="30" r="9" fill="#2698ba" opacity="0.6"/>
  <!-- central buffered agent — glowing -->
  <circle cx="100" cy="100" r="22" fill="#b509ac" opacity="0.18"/>
  <circle cx="100" cy="100" r="16" fill="#b509ac" opacity="0.4"/>
  <circle cx="100" cy="100" r="11" fill="#e040fb"/>
  <!-- stress wave rings -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="#e040fb" stroke-width="1" opacity="0.25"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#e040fb" stroke-width="0.7" opacity="0.15"/>
  <!-- label -->
  <text x="100" y="183" font-family="sans-serif" font-size="10" fill="#ccc" text-anchor="middle">Social Buffering</text>
</svg>