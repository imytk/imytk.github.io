<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#0d1b2a"/>
  <!-- hierarchical levels -->
  <rect x="60" y="22" width="80" height="28" rx="6" fill="#2698ba" opacity="0.8"/>
  <text x="100" y="41" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Prior Beliefs</text>
  <rect x="60" y="86" width="80" height="28" rx="6" fill="#b509ac" opacity="0.8"/>
  <text x="100" y="105" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Prediction</text>
  <rect x="60" y="150" width="80" height="28" rx="6" fill="#2698ba" opacity="0.8"/>
  <text x="100" y="169" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Sensory Input</text>
  <!-- downward arrows (predictions) -->
  <line x1="100" y1="50" x2="100" y2="83" stroke="#2698ba" stroke-width="2"/>
  <polygon points="95,80 105,80 100,86" fill="#2698ba"/>
  <line x1="100" y1="114" x2="100" y2="147" stroke="#2698ba" stroke-width="2"/>
  <polygon points="95,144 105,144 100,150" fill="#2698ba"/>
  <!-- upward arrows (prediction errors) -->
  <line x1="115" y1="147" x2="115" y2="117" stroke="#e040fb" stroke-width="1.5"/>
  <polygon points="110,120 120,120 115,114" fill="#e040fb"/>
  <line x1="115" y1="83" x2="115" y2="53" stroke="#e040fb" stroke-width="1.5"/>
  <polygon points="110,56 120,56 115,50" fill="#e040fb"/>
  <!-- cortisol/stress squiggle on the side -->
  <path d="M155,40 Q163,55 155,70 Q147,85 155,100 Q163,115 155,130 Q147,145 155,160" 
        stroke="#ff6b6b" stroke-width="2" fill="none" opacity="0.7"/>
  <text x="162" y="100" font-family="sans-serif" font-size="7" fill="#ff6b6b" opacity="0.8" transform="rotate(90,162,100)">cortisol</text>
  <!-- PE label -->
  <text x="122" y="100" font-family="sans-serif" font-size="7" fill="#e040fb" opacity="0.9">ε</text>
</svg>