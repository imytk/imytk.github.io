<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#0d1b2a"/>
  <!-- Neural network layers -->
  <!-- Input layer -->
  <circle cx="30" cy="60" r="7" fill="#2698ba" opacity="0.9"/>
  <circle cx="30" cy="90" r="7" fill="#2698ba" opacity="0.9"/>
  <circle cx="30" cy="120" r="7" fill="#2698ba" opacity="0.9"/>
  <circle cx="30" cy="150" r="7" fill="#2698ba" opacity="0.9"/>
  <!-- Hidden layer 1 -->
  <circle cx="85" cy="50" r="7" fill="#b509ac" opacity="0.85"/>
  <circle cx="85" cy="78" r="7" fill="#b509ac" opacity="0.85"/>
  <circle cx="85" cy="106" r="7" fill="#b509ac" opacity="0.85"/>
  <circle cx="85" cy="134" r="7" fill="#b509ac" opacity="0.85"/>
  <circle cx="85" cy="162" r="7" fill="#b509ac" opacity="0.85"/>
  <!-- Hidden layer 2 -->
  <circle cx="140" cy="70" r="7" fill="#b509ac" opacity="0.85"/>
  <circle cx="140" cy="100" r="7" fill="#b509ac" opacity="0.85"/>
  <circle cx="140" cy="130" r="7" fill="#b509ac" opacity="0.85"/>
  <!-- Output (engaged / not) -->
  <circle cx="178" cy="88" r="9" fill="#4caf50" opacity="0.9"/>
  <circle cx="178" cy="118" r="9" fill="#f44336" opacity="0.9"/>
  <text x="178" y="91" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">✓</text>
  <text x="178" y="121" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">✗</text>
  <!-- Connections input->h1 (sample) -->
  <line x1="37" y1="60" x2="78" y2="50" stroke="#2698ba" stroke-width="0.6" opacity="0.35"/>
  <line x1="37" y1="90" x2="78" y2="78" stroke="#2698ba" stroke-width="0.6" opacity="0.35"/>
  <line x1="37" y1="120" x2="78" y2="106" stroke="#2698ba" stroke-width="0.6" opacity="0.35"/>
  <line x1="37" y1="150" x2="78" y2="134" stroke="#2698ba" stroke-width="0.6" opacity="0.35"/>
  <line x1="37" y1="60" x2="78" y2="162" stroke="#2698ba" stroke-width="0.6" opacity="0.2"/>
  <!-- Connections h1->h2 (sample) -->
  <line x1="92" y1="50" x2="133" y2="70" stroke="#b509ac" stroke-width="0.6" opacity="0.35"/>
  <line x1="92" y1="106" x2="133" y2="100" stroke="#b509ac" stroke-width="0.6" opacity="0.35"/>
  <line x1="92" y1="134" x2="133" y2="130" stroke="#b509ac" stroke-width="0.6" opacity="0.35"/>
  <!-- h2->output -->
  <line x1="147" y1="70" x2="169" y2="88" stroke="#4caf50" stroke-width="1" opacity="0.6"/>
  <line x1="147" y1="130" x2="169" y2="118" stroke="#f44336" stroke-width="1" opacity="0.6"/>
  <line x1="147" y1="100" x2="169" y2="88" stroke="#4caf50" stroke-width="0.6" opacity="0.4"/>
  <line x1="147" y1="100" x2="169" y2="118" stroke="#f44336" stroke-width="0.6" opacity="0.4"/>
  <text x="100" y="188" font-family="sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Engagement Detection</text>
</svg>