<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#0d1b2a"/>
  <!-- noisy signal that settles -->
  <polyline points="15,100 28,70 38,130 50,55 62,145 72,80 80,115 90,95 100,102 112,98 125,101 140,100 160,100 185,100"
    fill="none" stroke="#2698ba" stroke-width="2" opacity="0.9"/>
  <!-- setpoint line -->
  <line x1="15" y1="100" x2="185" y2="100" stroke="#b509ac" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- allostatic load arrow / bracket -->
  <line x1="50" y1="55" x2="50" y2="100" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
  <polygon points="47,97 53,97 50,103" fill="#ff6b6b" opacity="0.7"/>
  <text x="53" y="72" font-family="sans-serif" font-size="8" fill="#ff6b6b" opacity="0.8">load</text>
  <!-- settled section shading -->
  <rect x="125" y="85" width="60" height="30" rx="4" fill="#2698ba" opacity="0.08"/>
  <text x="155" y="155" font-family="sans-serif" font-size="9" fill="#2698ba" opacity="0.7" text-anchor="middle">allostasis</text>
  <!-- noise label -->
  <text x="55" y="170" font-family="sans-serif" font-size="9" fill="#aaa" text-anchor="middle">noise → stability</text>
  <!-- title hint -->
  <text x="100" y="190" font-family="sans-serif" font-size="8" fill="#666" text-anchor="middle">[Social] Allostasis</text>
</svg>