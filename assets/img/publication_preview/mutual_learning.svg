<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#0d1b2a"/>
  <!-- Robot icon left -->
  <rect x="22" y="68" width="48" height="36" rx="6" fill="#2698ba" opacity="0.85"/>
  <circle cx="35" cy="82" r="5" fill="white" opacity="0.9"/>
  <circle cx="57" cy="82" r="5" fill="white" opacity="0.9"/>
  <rect x="26" y="62" width="40" height="8" rx="4" fill="#1e88e5" opacity="0.9"/>
  <rect x="22" y="104" width="48" height="28" rx="4" fill="#2698ba" opacity="0.7"/>
  <!-- Human icon right -->
  <circle cx="155" cy="68" r="18" fill="#e8a87c" opacity="0.9"/>
  <rect x="137" y="88" width="36" height="36" rx="6" fill="#ef9a9a" opacity="0.8"/>
  <!-- Bidirectional arrows in the middle -->
  <!-- Arrow robot -> human -->
  <path d="M73,88 Q100,72 127,82" stroke="#b509ac" stroke-width="2" fill="none"/>
  <polygon points="122,78 130,82 123,88" fill="#b509ac"/>
  <!-- Arrow human -> robot -->
  <path d="M127,98 Q100,114 73,104" stroke="#2698ba" stroke-width="2" fill="none"/>
  <polygon points="78,108 70,104 77,98" fill="#2698ba"/>
  <!-- Small word bubbles / learning icons -->
  <rect x="85" y="120" width="30" height="18" rx="4" fill="#b509ac" opacity="0.7"/>
  <text x="100" y="133" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">learn</text>
  <polygon points="97,138 103,138 100,144" fill="#b509ac" opacity="0.7"/>
  <!-- DOT label -->
  <text x="100" y="170" font-family="sans-serif" font-size="8" fill="#2698ba" text-anchor="middle">Differential Outcomes</text>
  <text x="100" y="182" font-family="sans-serif" font-size="8" fill="#2698ba" text-anchor="middle">Training</text>
</svg>