  <circle cx="82" cy="82" r="4" fill="#0d1b2a"/>
  <circle cx="118" cy="82" r="4" fill="#0d1b2a"/>
  <!-- Nose -->
  <path d="M100,90 L95,112 Q100,116 105,112 Z" fill="none" stroke="#2698ba" stroke-width="1.5" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M82,122 Q100,132 118,122" fill="none" stroke="#2698ba" stroke-width="1.8" opacity="0.7"/>
  <!-- PCA decomposition hint -->
  <text x="100" y="175" font-family="sans-serif" font-size="8" fill="#2698ba" text-anchor="middle">Eigenface Analysis</text>
  <text x="100" y="188" font-family="sans-serif" font-size="8" fill="#666" text-anchor="middle">Non-Caucasian Faces</text>
