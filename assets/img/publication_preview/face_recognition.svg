  <!-- Grid overlay (eigenspace) -->
  <line x1="48" y1="52" x2="152" y2="52" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="48" y1="72" x2="152" y2="72" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="48" y1="92" x2="152" y2="92" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="48" y1="112" x2="152" y2="112" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="48" y1="132" x2="152" y2="132" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="68" y1="30" x2="68" y2="154" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="88" y1="30" x2="88" y2="154" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
  <line x1="108" y1="30" x2="108" y2="154" stroke="#b509ac" stroke-width="0.7" opacity="0.4"/>
