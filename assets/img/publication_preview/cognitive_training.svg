           C115,158 125,150 128,140 C140,138 148,128 148,115 C148,105 155,95 155,80 C155,50 130,30 100,30Z"
    fill="none" stroke="#2698ba" stroke-width="2.5" opacity="0.7"/>
  <!-- Neural connections inside brain -->
  <circle cx="80" cy="75" r="4" fill="#e040fb" opacity="0.9"/>
  <circle cx="120" cy="75" r="4" fill="#e040fb" opacity="0.9"/>
  <circle cx="100" cy="95" r="4" fill="#2698ba" opacity="0.9"/>
  <circle cx="75" cy="110" r="4" fill="#e040fb" opacity="0.9"/>
  <circle cx="125" cy="110" r="4" fill="#e040fb" opacity="0.9"/>
  <circle cx="100" cy="125" r="4" fill="#2698ba" opacity="0.9"/>
  <line x1="80" y1="75" x2="120" y2="75" stroke="#e040fb" stroke-width="1.2" opacity="0.6"/>
  <line x1="80" y1="75" x2="100" y2="95" stroke="#2698ba" stroke-width="1.2" opacity="0.6"/>
  <line x1="120" y1="75" x2="100" y2="95" stroke="#2698ba" stroke-width="1.2" opacity="0.6"/>
  <line x1="100" y1="95" x2="75" y2="110" stroke="#2698ba" stroke-width="1.2" opacity="0.6"/>
  <line x1="100" y1="95" x2="125" y2="110" stroke="#2698ba" stroke-width="1.2" opacity="0.6"/>
  <line x1="75" y1="110" x2="100" y2="125" stroke="#e040fb" stroke-width="1.2" opacity="0.6"/>
  <line x1="125" y1="110" x2="100" y2="125" stroke="#e040fb" stroke-width="1.2" opacity="0.6"/>
  <line x1="75" y1="110" x2="125" y2="110" stroke="#e040fb" stroke-width="1" opacity="0.4"/>
  <!-- Memory improvement arrow -->
  <path d="M155,80 L170,80 L170,130 L155,130" stroke="#b509ac" stroke-width="2" fill="none" opacity="0.7"/>
  <polygon points="158,77 164,80 158,83" fill="#b509ac" opacity="0.7"/>
  <text x="172" y="108" font-family="sans-serif" font-size="8" fill="#b509ac" opacity="0.8" writing-mode="tb">+memory</text>
  <!-- Title -->
  <text x="100" y="182" font-family="sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Cognitive Training</text>
