<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#0d2614"/>
  <!-- Ground -->
  <ellipse cx="100" cy="168" rx="70" ry="12" fill="#1a4a1a" opacity="0.7"/>
  <!-- Tree trunk -->
  <rect x="92" y="100" width="16" height="68" rx="5" fill="#5d4037" opacity="0.9"/>
  <!-- Tree canopy layers -->
  <polygon points="100,20 60,90 140,90" fill="#2e7d32" opacity="0.8"/>
  <polygon points="100,38 65,100 135,100" fill="#388e3c" opacity="0.85"/>
  <polygon points="100,58 70,112 130,112" fill="#43a047" opacity="0.9"/>
  <!-- Ecosystem nodes (animals/plants connected by dashed lines) -->
  <circle cx="35" cy="75" r="7" fill="#ffb74d" opacity="0.8"/>
  <circle cx="168" cy="80" r="7" fill="#80cbc4" opacity="0.8"/>
  <circle cx="40" cy="140" r="7" fill="#ce93d8" opacity="0.8"/>
  <circle cx="162" cy="145" r="7" fill="#ef9a9a" opacity="0.8"/>
  <!-- Network lines from tree to nodes -->
  <line x1="96" y1="110" x2="42" y2="78" stroke="#a5d6a7" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="104" y1="110" x2="161" y2="83" stroke="#a5d6a7" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="96" y1="155" x2="47" y2="143" stroke="#a5d6a7" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="104" y1="155" x2="155" y2="148" stroke="#a5d6a7" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- UK boundary hint (simplified) -->
  <text x="100" y="193" font-family="sans-serif" font-size="9" fill="#81c784" text-anchor="middle">Rewilding · Complex Systems</text>
</svg>